name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item -Force build\Release\CodexProxyLauncher.exe out\
          Copy-Item -Force build\Release\codex_proxy_hook.dll out\
          Copy-Item -Force resources\config-web.html out\
          Copy-Item -Force resources\default_config.json out\config.json
          Compress-Archive -Force -Path out\* -DestinationPath codex-app-proxy-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-app-proxy-windows-x64
          path: codex-app-proxy-windows-x64.zip
